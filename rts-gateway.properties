
#Keyclock auth server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/rts-realme

#Liquibase --disable liquibase on app start up run it separately using 
spring.liquibase.enabled=false

# DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/testdb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# replace update to none as Liquibase will manage db schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect -- spring boot 3.x will auto detect Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect




#Redis Cache
spring.data.redis.host=localhost
spring.data.redis.port=6379

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.hbm2ddl=DEBUG

logging.level.org.springframework.security: DEBUG
logging.level.org.springframework.security.oauth2: DEBUG
custom.name=naqueeb